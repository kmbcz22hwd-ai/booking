<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>顯德筋絡調理室 - 線上預約</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans TC', sans-serif;
    background: #F1ECE1;
    color: #22251F;
  }
  #app { max-width: 460px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }
  .header { background: #2F4A3E; padding: 20px 18px 0; color: #fff; }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logo-dot { width: 30px; height: 30px; border-radius: 50%; background: #7C9885; flex-shrink: 0; }
  .brand-name { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; }
  .brand-sub { font-size: 11.5px; opacity: 0.75; margin-top: 2px; }
  .tabs { display: flex; gap: 4px; }
  .tab-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
    background: transparent; border: none; color: rgba(255,255,255,0.68);
    font-size: 12.5px; padding: 10px 4px; cursor: pointer; border-bottom: 2px solid transparent;
    position: relative; font-family: 'Noto Sans TC', sans-serif;
  }
  .tab-btn.active { color: #fff; border-bottom: 2px solid #A85C32; font-weight: 700; }
  .badge {
    position: absolute; top: 4px; right: 22%; background: #A85C32; color: #fff;
    font-size: 9px; border-radius: 8px; padding: 0 5px; line-height: 14px;
  }
  .body-pad { padding: 20px 16px; }
  .section-label { font-size: 13px; font-weight: 700; color: #2F4A3E; margin: 18px 0 10px; font-family: 'Noto Serif TC', serif; }
  .date-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; }
  .date-card {
    flex-shrink: 0; width: 52px; height: 64px; border-radius: 12px; border: 1px solid #E7DFCE;
    background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; position: relative; font-family: 'Noto Sans TC', sans-serif;
  }
  .date-card.selected { background: #2F4A3E; border-color: #2F4A3E; color: #fff; }
  .date-card.closed { opacity: 0.35; cursor: not-allowed; }
  .date-card .wd { font-size: 11px; }
  .date-card .num { font-size: 17px; font-weight: 700; margin-top: 2px; }
  .date-card .closed-lbl { position: absolute; bottom: 3px; font-size: 9px; }
  .duration-row { display: flex; gap: 10px; }
  .duration-btn, .slot-btn {
    padding: 12px 0; border-radius: 10px; border: 1px solid #E7DFCE; background: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer; color: #22251F;
  }
  .duration-row .duration-btn { flex: 1; }
  .duration-btn.active { background: #A85C32; border-color: #A85C32; color: #fff; }
  .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .slot-btn { color: #203329; }
  .slot-btn.selected { background: #2F4A3E; border-color: #2F4A3E; color: #fff; }
  .slot-btn.booked { background: #F6E4DF; color: #C24C3B; border-color: #F6E4DF; cursor: not-allowed; text-decoration: line-through; }
  .empty-box { padding: 18px; background: #fff; border-radius: 10px; font-size: 13.5px; color: #8B8B80; text-align: center; border: 1px dashed #E7DFCE; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-top: 14px; text-align: center; box-shadow: 0 2px 10px rgba(47,74,62,0.06); }
  .success-icon { width: 52px; height: 52px; border-radius: 50%; background: #2F4A3E; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; color: #fff; font-size: 24px; }
  .success-title { font-family: 'Noto Serif TC', serif; font-size: 19px; margin: 0 0 14px; }
  .success-box { background: #F1ECE1; border-radius: 10px; padding: 14px; text-align: left; margin-bottom: 14px; }
  .success-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13.5px; }
  .success-row .lbl { color: #8B8B80; }
  .success-row .val { font-weight: 700; color: #203329; }
  .success-hint { font-size: 12.5px; color: #8B8B80; line-height: 1.6; margin-bottom: 14px; }
  .form-field { display: flex; align-items: center; gap: 8px; background: #F1ECE1; border-radius: 10px; padding: 11px 12px; margin-bottom: 10px; text-align: left; }
  .form-field input { border: none; background: transparent; outline: none; font-size: 14px; width: 100%; font-family: 'Noto Sans TC', sans-serif; color: #22251F; }
  .error-text { color: #C24C3B; font-size: 12.5px; margin-bottom: 10px; text-align: left; }
  .primary-btn {
    width: 100%; background: #2F4A3E; color: #fff; border: none; border-radius: 10px; padding: 13px 0;
    font-size: 14.5px; font-weight: 700; cursor: pointer; margin-top: 4px; font-family: 'Noto Sans TC', sans-serif;
  }
  .primary-btn:disabled { opacity: 0.6; }
  .danger-btn { background: #F6E4DF; color: #C24C3B; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .booking-row { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .booking-row .d { font-weight: 700; font-size: 13.5px; color: #203329; }
  .booking-row .t { font-size: 12.5px; color: #8B8B80; margin-top: 2px; }
  .divider { height: 1px; background: #E7DFCE; margin: 22px 0; }
  .admin-header-row { display: flex; justify-content: space-between; align-items: center; }
  .link-btn { background: none; border: none; color: #A85C32; font-size: 12.5px; cursor: pointer; font-weight: 700; padding: 0; }
  .notif-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 13px; }
  .notif-row.unread { background: #F1ECE1; }
  .hint-text { font-size: 12px; color: #8B8B80; margin-bottom: 10px; }
  .schedule-row { margin-bottom: 10px; }
  .schedule-check-label { display: flex; align-items: center; gap: 6px; font-size: 13.5px; font-weight: 700; margin-bottom: 5px; color: #203329; }
  .schedule-input { width: 100%; padding: 9px 10px; border-radius: 8px; border: 1px solid #E7DFCE; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; }
  .saved-tip { color: #2F4A3E; font-size: 12.5px; margin-top: 8px; font-weight: 700; }
  .closed-date-row { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; font-size: 13px; }
  .icon-btn { background: none; border: none; color: #C24C3B; cursor: pointer; }
  .customer-pick-row { width: 100%; display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #E7DFCE; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
  .picked-customer-box { display: flex; justify-content: space-between; align-items: center; background: #F1ECE1; border-radius: 8px; padding: 10px 12px; font-size: 13.5px; font-weight: 700; color: #203329; margin-bottom: 12px; }
  .loading-wrap { min-height: 300px; display: flex; align-items: center; justify-content: center; color: #2F4A3E; }
</style>
</head>
<body>
<div id="app">
  <div class="loading-wrap">載入中…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs,
  query, where, orderBy, limit, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ====== Firebase 設定：換成你自己的 firebaseConfig ======
const firebaseConfig = {
  apiKey: "AIzaSyDkLms4g5-UPuMQcFl0pvxGU8bsqdLEqA0",
  authDomain: "sian-customer-records.firebaseapp.com",
  projectId: "sian-customer-records",
  storageBucket: "sian-customer-records.firebasestorage.app",
  messagingSenderId: "408702062626",
  appId: "1:408702062626:web:5317965599bd8678feba7b",
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ====== 常數 ======
const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];
const WEEKDAY_KEYS = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
const DEFAULT_SCHEDULE = {
  sun: { open: false, windows: "" },
  mon: { open: true, windows: "10:00-12:00,18:30-21:00" },
  tue: { open: true, windows: "10:00-21:00" },
  wed: { open: true, windows: "10:00-21:00" },
  thu: { open: true, windows: "10:00-21:00" },
  fri: { open: true, windows: "10:00-12:00,18:30-21:00" },
  sat: { open: true, windows: "09:00-12:00,18:30-21:00" },
};
const DURATIONS = [{ label: "60 分鐘", value: 60 }, { label: "90 分鐘", value: 90 }];

// ====== 工具函式 ======
const pad = (n) => String(n).padStart(2, "0");
const toDateStr = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const timeToMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
const minToTime = (m) => `${pad(Math.floor(m / 60))}:${pad(m % 60)}`;
const parseWindows = (str) => (str || "").split(",").map(s => s.trim()).filter(Boolean)
  .map(s => { const [start, end] = s.split("-").map(x => x.trim()); return { start, end }; })
  .filter(w => w.start && w.end);
const genId = (p = "") => p + Math.random().toString(36).slice(2, 8).toUpperCase();
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
function formatDateCN(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function generateSlots(dateStr, durationMin, schedule, bookings) {
  const d = new Date(dateStr + "T00:00:00");
  const wk = WEEKDAY_KEYS[d.getDay()];
  const daySchedule = schedule[wk];
  if (!daySchedule || !daySchedule.open) return [];
  const windows = parseWindows(daySchedule.windows);
  const confirmed = bookings.filter(b => b.status === "confirmed");
  const slots = [];
  const now = new Date();
  const isToday = toDateStr(now) === dateStr;
  const nowMin = now.getHours() * 60 + now.getMinutes();
  windows.forEach(w => {
    const wStart = timeToMin(w.start), wEnd = timeToMin(w.end);
    for (let s = wStart; s + durationMin <= wEnd; s += 30) {
      if (isToday && s <= nowMin) continue;
      const conflict = confirmed.some(b => {
        const bs = timeToMin(b.start), be = bs + b.duration;
        return s < be && bs < s + durationMin;
      });
      slots.push({ start: s, end: s + durationMin, booked: conflict });
    }
  });
  return slots;
}
async function sendEmail(emailjsConfig, { toEmail, name, title, message, replyEmail }) {
  if (!emailjsConfig?.serviceId || !emailjsConfig?.templateId || !emailjsConfig?.publicKey || !toEmail) return;
  try {
    await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: emailjsConfig.serviceId, template_id: emailjsConfig.templateId, user_id: emailjsConfig.publicKey,
        template_params: {
          to_email: toEmail, name: name || "", title: title || "", message: message || "",
          email: replyEmail || "", time: new Date().toLocaleString("zh-TW", { timeZone: "Asia/Taipei" }),
        },
      }),
    });
  } catch (e) { console.error("email send failed", e); }
}

// ====== Firestore 存取 ======
async function getConfig(key, fallback) {
  try {
    const snap = await getDoc(doc(db, "config", key));
    return snap.exists() ? snap.data() : fallback;
  } catch (e) { console.error(e); return fallback; }
}
async function setConfig(key, data) {
  try { await setDoc(doc(db, "config", key), data); return true; }
  catch (e) { console.error(e); return false; }
}
async function loadBookingsForDate(dateStr) {
  try {
    const q = query(collection(db, "bookings"), where("date", "==", dateStr));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error(e); return []; }
}
async function addBooking(record) {
  const ref = await addDoc(collection(db, "bookings"), record);
  return ref.id;
}
async function cancelBookingDoc(id) {
  await updateDoc(doc(db, "bookings", id), { status: "cancelled" });
}
async function searchBookingsByPhone(phone) {
  try {
    const q = query(collection(db, "bookings"), where("phone", "==", phone), where("status", "==", "confirmed"));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.date + a.start).localeCompare(b.date + b.start));
  } catch (e) { console.error(e); return []; }
}
async function addNotification(note) {
  await addDoc(collection(db, "notifications"), { read: false, timestamp: Date.now(), ...note });
}
async function loadNotifications() {
  try {
    const q = query(collection(db, "notifications"), orderBy("timestamp", "desc"), limit(50));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error(e); return []; }
}
async function markAllNotificationsRead(list) {
  await Promise.all(list.filter(n => !n.read).map(n => updateDoc(doc(db, "notifications", n.id), { read: true })));
}
async function upsertCustomer(rec) {
  if (!rec.phone) return;
  try { await setDoc(doc(db, "customers", rec.phone), { name: rec.name, phone: rec.phone, email: rec.email || "", lastBooked: Date.now() }, { merge: true }); }
  catch (e) { console.error(e); }
}
async function loadDirectory() {
  try {
    const q = query(collection(db, "customers"), orderBy("lastBooked", "desc"), limit(500));
    const snap = await getDocs(q);
    return snap.docs.map(d => d.data());
  } catch (e) { console.error(e); return []; }
}

// ====== 全域狀態 ======
const S = {
  tab: "book",
  loading: true,
  schedule: DEFAULT_SCHEDULE,
  closedDates: [],
  notifications: [],
  adminAuth: { password: "0000", adminEmail: "", emailjs: { serviceId: "", templateId: "", publicKey: "" } },
  isAdmin: false,
  directory: [],
  bookingsCache: {},
  book: { selectedDate: null, duration: 60, selectedSlot: null, success: null, error: "", submitting: false },
  manage: { results: null, searching: false },
  admin: {
    pwError: "", scheduleDraft: null, savedTip: "", viewDate: toDateStr(new Date()),
    customerQuery: "", pickedCustomer: null, matchedCustomers: [],
    qb: { date: null, duration: 60, slot: null, submitting: false, success: "", error: "" },
  },
};

async function init() {
  S.schedule = await getConfig("schedule", DEFAULT_SCHEDULE);
  const cd = await getConfig("closedDates", { list: [] });
  S.closedDates = cd.list || [];
  S.adminAuth = await getConfig("adminAuth", S.adminAuth);
  S.notifications = await loadNotifications();
  S.directory = await loadDirectory();
  S.admin.scheduleDraft = JSON.parse(JSON.stringify(S.schedule));
  S.loading = false;
  render();
}

async function ensureBookings(dateStr) {
  if (!S.bookingsCache[dateStr]) {
    S.bookingsCache[dateStr] = await loadBookingsForDate(dateStr);
  }
  return S.bookingsCache[dateStr];
}
async function refreshBookings(dateStr) {
  S.bookingsCache[dateStr] = await loadBookingsForDate(dateStr);
  return S.bookingsCache[dateStr];
}

// ====== 渲染 ======
function dateStripHTML(selected, closedDates, schedule, days, handler) {
  const today = new Date(); today.setHours(0,0,0,0);
  let html = `<div class="date-strip">`;
  for (let i = 0; i < days; i++) {
    const d = new Date(today); d.setDate(d.getDate() + i);
    const dateStr = toDateStr(d);
    const wk = WEEKDAY_KEYS[d.getDay()];
    const scheduleClosed = !schedule[wk]?.open || parseWindows(schedule[wk]?.windows).length === 0;
    const manuallyClosed = closedDates.includes(dateStr);
    const isClosed = scheduleClosed || manuallyClosed;
    const isSel = selected === dateStr;
    html += `<button class="date-card ${isSel ? "selected" : ""} ${isClosed ? "closed" : ""}"
      ${isClosed ? "disabled" : `onclick="${handler}('${dateStr}')"`}>
      <div class="wd">${WEEKDAYS[d.getDay()]}</div><div class="num">${d.getDate()}</div>
      ${isClosed ? '<div class="closed-lbl">休</div>' : ""}
    </button>`;
  }
  html += `</div>`;
  return html;
}
function slotGridHTML(slots, selectedSlot, selectHandler) {
  if (slots.length === 0) return `<div class="empty-box">這個時長在此日期沒有可預約的時段，請換個日期或時長試試。</div>`;
  let html = `<div class="slot-grid">`;
  slots.forEach(s => {
    const isSel = selectedSlot && selectedSlot.start === s.start;
    html += `<button class="slot-btn ${s.booked ? "booked" : ""} ${isSel ? "selected" : ""}"
      ${s.booked ? "disabled" : `onclick="${selectHandler}(${s.start})"`}>${minToTime(s.start)}</button>`;
  });
  html += `</div>`;
  return html;
}
function durationRowHTML(current, handler) {
  return `<div class="duration-row">${DURATIONS.map(d =>
    `<button class="duration-btn ${current === d.value ? "active" : ""}" onclick="${handler}(${d.value})">${d.label}</button>`
  ).join("")}</div>`;
}

function renderHeader() {
  const unread = S.notifications.filter(n => !n.read).length;
  return `
  <div class="header">
    <div class="header-top">
      <div class="logo-dot"></div>
      <div><div class="brand-name">顯德筋絡調理室</div><div class="brand-sub">線上預約 · 三重</div></div>
    </div>
    <svg width="100%" height="14" viewBox="0 0 400 14" preserveAspectRatio="none" style="margin-bottom:6px;opacity:.9">
      <path d="M0 7 Q 25 0, 50 7 T 100 7 T 150 7 T 200 7 T 250 7 T 300 7 T 350 7 T 400 7" fill="none" stroke="#C9A876" stroke-width="1.5" opacity="0.6"/>
    </svg>
    <div class="tabs">
      <button class="tab-btn ${S.tab === "book" ? "active" : ""}" onclick="selectTab('book')">📅 我要預約</button>
      <button class="tab-btn ${S.tab === "manage" ? "active" : ""}" onclick="selectTab('manage')">⏰ 查詢/取消</button>
      <button class="tab-btn ${S.tab === "admin" ? "active" : ""}" onclick="selectTab('admin')">
        ${S.isAdmin && unread > 0 ? "🔔" : "🔒"} 老闆後台 ${S.isAdmin && unread > 0 ? `<span class="badge">${unread}</span>` : ""}
      </button>
    </div>
  </div>`;
}

function renderBookTab() {
  const b = S.book;
  if (b.success) {
    const r = b.success;
    return `<div class="body-pad"><div class="card">
      <div class="success-icon">✓</div>
      <h2 class="success-title">預約成功</h2>
      <div class="success-box">
        <div class="success-row"><span class="lbl">日期</span><span class="val">${formatDateCN(r.date)}</span></div>
        <div class="success-row"><span class="lbl">時間</span><span class="val">${r.start}（${r.duration} 分鐘）</span></div>
        <div class="success-row"><span class="lbl">姓名</span><span class="val">${esc(r.name)}</span></div>
        <div class="success-row"><span class="lbl">電話</span><span class="val">${esc(r.phone)}</span></div>
      </div>
      <p class="success-hint">請截圖保存本畫面。若需取消預約，請至「查詢/取消」頁面，用您的手機號碼查詢。</p>
      <button class="primary-btn" onclick="bookReset()">再預約一個時段</button>
    </div></div>`;
  }
  let html = `<div class="body-pad">`;
  html += `<div class="section-label">1. 選擇日期</div>`;
  html += dateStripHTML(b.selectedDate, S.closedDates, S.schedule, 21, "bookSelectDate");
  if (b.selectedDate) {
    html += `<div class="section-label">2. 選擇時長</div>`;
    html += durationRowHTML(b.duration, "bookSelectDuration");
    html += `<div class="section-label">3. 選擇時段</div>`;
    const bookings = S.bookingsCache[b.selectedDate] || [];
    const slots = generateSlots(b.selectedDate, b.duration, S.schedule, bookings);
    html += slotGridHTML(slots, b.selectedSlot, "bookSelectSlot");
    if (b.selectedSlot) {
      html += `<div class="card" style="text-align:left">
        <div class="section-label" style="margin-top:0">4. 填寫資料</div>
        <div class="form-field">👤 <input id="bk-name" placeholder="姓名" /></div>
        <div class="form-field">📞 <input id="bk-phone" placeholder="手機號碼（09xxxxxxxx）" /></div>
        <div class="form-field">✉️ <input id="bk-email" placeholder="Email（選填，填寫可收到預約確認信）" /></div>
        <div class="form-field">📝 <input id="bk-note" placeholder="備註（選填，如：舊傷部位）" /></div>
        ${b.error ? `<div class="error-text">${esc(b.error)}</div>` : ""}
        <button class="primary-btn" ${b.submitting ? "disabled" : ""} onclick="bookSubmit()">
          ${b.submitting ? "送出中…" : `確認預約 ${formatDateCN(b.selectedDate)} ${minToTime(b.selectedSlot.start)}`}
        </button>
      </div>`;
    }
  }
  html += `</div>`;
  return html;
}

function renderManageTab() {
  const m = S.manage;
  let html = `<div class="body-pad">`;
  html += `<div class="section-label">輸入您預約時填寫的手機號碼</div>`;
  html += `<div class="form-field">📞 <input id="mg-phone" placeholder="09xxxxxxxx" /></div>`;
  html += `<button class="primary-btn" ${m.searching ? "disabled" : ""} onclick="manageSearch()">${m.searching ? "查詢中…" : "查詢我的預約"}</button>`;
  if (m.results) {
    html += `<div style="margin-top:20px">`;
    if (m.results.length === 0) {
      html += `<div class="empty-box">查無此手機號碼的預約紀錄。</div>`;
    } else {
      m.results.forEach(b => {
        html += `<div class="booking-row">
          <div><div class="d">${formatDateCN(b.date)}</div><div class="t">${b.start}（${b.duration} 分鐘） · ${esc(b.name)}</div></div>
          <button class="danger-btn" onclick="manageCancel('${b.id}','${b.date}')">取消預約</button>
        </div>`;
      });
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderAdminLogin() {
  return `<div class="body-pad"><div class="card">
    <div style="font-size:22px">🔒</div>
    <h2 class="success-title">老闆後台</h2>
    <p style="color:#6B6B63;font-size:14px;margin-bottom:16px">請輸入後台密碼</p>
    <div class="form-field"><input id="admin-pw-input" type="password" placeholder="密碼" /></div>
    ${S.admin.pwError ? `<div class="error-text">${esc(S.admin.pwError)}</div>` : ""}
    <button class="primary-btn" onclick="adminLoginSubmit()">登入</button>
  </div></div>`;
}

function renderQuickBook() {
  const a = S.admin;
  let html = `<div class="section-label">幫客人快速預約</div>`;
  html += `<div class="form-field">👤 <input id="qb-search" placeholder="輸入姓名或手機號碼搜尋名冊" value="${esc(a.customerQuery)}" oninput="adminCustomerSearchInput(this.value)" /></div>`;
  html += `<div id="qb-matches">${renderCustomerMatches()}</div>`;
  if (a.pickedCustomer) {
    html += `<div class="picked-customer-box">已選擇：${esc(a.pickedCustomer.name)}（${esc(a.pickedCustomer.phone)}）
      <button class="link-btn" onclick="adminUnpickCustomer()">重選</button></div>`;
    html += dateStripHTML(a.qb.date, S.closedDates, S.schedule, 30, "adminQbSelectDate");
    if (a.qb.date) {
      html += durationRowHTML(a.qb.duration, "adminQbSelectDuration");
      const bookings = S.bookingsCache[a.qb.date] || [];
      const slots = generateSlots(a.qb.date, a.qb.duration, S.schedule, bookings);
      html += slotGridHTML(slots, a.qb.slot, "adminQbSelectSlot");
      if (a.qb.slot) {
        html += `<div class="form-field">📝 <input id="qb-note" placeholder="備註（選填）" /></div>`;
        if (a.qb.error) html += `<div class="error-text">${esc(a.qb.error)}</div>`;
        html += `<button class="primary-btn" ${a.qb.submitting ? "disabled" : ""} onclick="adminQbSubmit()">${a.qb.submitting ? "送出中…" : "確認幫客人預約"}</button>`;
      }
    }
  }
  if (a.qb.success) html += `<div class="saved-tip">${esc(a.qb.success)}</div>`;
  return html;
}
function renderCustomerMatches() {
  const a = S.admin;
  if (!a.customerQuery || a.pickedCustomer) return "";
  const q = a.customerQuery.trim();
  const matched = S.directory.filter(c => c.name.includes(q) || c.phone.includes(q)).slice(0, 8);
  if (matched.length > 0) {
    return matched.map(c => `<button class="customer-pick-row" onclick="adminPickCustomer('${c.phone}')">
      <span style="font-weight:700">${esc(c.name)}</span><span style="color:#8B8B80;font-size:12.5px">${esc(c.phone)}</span>
    </button>`).join("");
  }
  return `<div class="empty-box" style="margin-bottom:10px">名冊中查無此人，可直接輸入新客人資料</div>
    <div class="card" style="text-align:left">
      <div class="section-label" style="margin-top:0">新客人資料</div>
      <div class="form-field">👤 <input id="nc-name" placeholder="姓名" /></div>
      <div class="form-field">📞 <input id="nc-phone" placeholder="手機號碼（09xxxxxxxx）" /></div>
      <div class="form-field">✉️ <input id="nc-email" placeholder="Email（選填）" /></div>
      <div id="nc-err"></div>
      <button class="primary-btn" onclick="adminNewCustomerConfirm()">使用這位新客人</button>
    </div>`;
}

function renderAdminPanel() {
  const a = S.admin;
  let html = `<div class="body-pad">`;
  html += renderQuickBook();
  html += `<div class="divider"></div>`;
  html += `<div class="admin-header-row"><span class="section-label">通知</span>`;
  if (S.notifications.some(n => !n.read)) html += `<button class="link-btn" onclick="adminMarkAllRead()">全部標為已讀</button>`;
  html += `</div>`;
  if (S.notifications.length === 0) {
    html += `<div class="empty-box">目前沒有通知。</div>`;
  } else {
    html += `<div style="margin-bottom:20px">` + S.notifications.slice(0, 8).map(n =>
      `<div class="notif-row ${n.read ? "" : "unread"}">🔔 ${n.type === "new" ? "新預約" : "已取消"}：${formatDateCN(n.date)} ${n.start} · ${esc(n.name)}（${esc(n.phone)}）</div>`
    ).join("") + `</div>`;
  }
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">今日 / 選定日期預約清單</div>`;
  html += dateStripHTML(a.viewDate, S.closedDates, S.schedule, 30, "adminSelectViewDate");
  const viewBookings = (S.bookingsCache[a.viewDate] || []).filter(b => b.status === "confirmed").sort((x, y) => x.start.localeCompare(y.start));
  if (viewBookings.length === 0) {
    html += `<div class="empty-box">${formatDateCN(a.viewDate)} 目前沒有預約。</div>`;
  } else {
    viewBookings.forEach(b => {
      html += `<div class="booking-row">
        <div><div class="d">${b.start} · ${b.duration} 分鐘</div><div class="t">${esc(b.name)} · ${esc(b.phone)}${b.note ? " · " + esc(b.note) : ""}</div></div>
        <button class="danger-btn" onclick="adminCancelBooking('${b.id}','${a.viewDate}')">取消</button>
      </div>`;
    });
  }
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">每週排班設定</div>`;
  html += `<p class="hint-text">格式：開始-結束，多段用逗號分隔，例如 10:00-12:00,18:30-21:00</p>`;
  WEEKDAY_KEYS.forEach((key, idx) => {
    const d = a.scheduleDraft[key];
    html += `<div class="schedule-row">
      <label class="schedule-check-label"><input type="checkbox" id="sched-open-${key}" ${d.open ? "checked" : ""} onchange="adminScheduleToggle('${key}', this.checked)"> 週${WEEKDAYS[idx]}</label>
      <input class="schedule-input" id="sched-win-${key}" ${d.open ? "" : "disabled"} value="${esc(d.windows)}" placeholder="例如 10:00-12:00,18:30-21:00" oninput="adminScheduleWindowInput('${key}', this.value)" />
    </div>`;
  });
  html += `<button class="primary-btn" onclick="adminSaveSchedule()">儲存排班</button>`;
  if (a.savedTip) html += `<div class="saved-tip">${esc(a.savedTip)}</div>`;
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">公休 / 特定日期休診</div>`;
  html += `<div class="form-field"><input type="date" id="closed-date-input" /></div>`;
  html += `<button class="primary-btn" onclick="adminAddClosedDate()">新增休診日</button>`;
  html += `<div style="margin-top:10px">`;
  if (S.closedDates.length === 0) {
    html += `<div class="empty-box">目前沒有設定休診日。</div>`;
  } else {
    S.closedDates.forEach(d => {
      html += `<div class="closed-date-row"><span>${formatDateCN(d)}</span><button class="icon-btn" onclick="adminRemoveClosedDate('${d}')">🗑</button></div>`;
    });
  }
  html += `</div>`;
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">修改後台密碼</div>`;
  html += `<div class="form-field"><input id="new-pass-input" placeholder="輸入新密碼" /></div>`;
  html += `<button class="primary-btn" onclick="adminSavePassword()">更新密碼</button>`;
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">Email 通知設定</div>`;
  html += `<p class="hint-text">要用 emailjs.com（免費）才能自動寄信，需要 Service ID、Template ID、Public Key 三組值。設定完成後，客人預約/取消時會自動寄信到你的信箱；客人有填 Email 的話也會收到確認信。</p>`;
  html += `<div class="form-field"><input id="admin-email-input" placeholder="你的收件信箱" value="${esc(S.adminAuth.adminEmail)}" /></div>`;
  html += `<div class="form-field"><input id="ej-service" placeholder="EmailJS Service ID" value="${esc(S.adminAuth.emailjs.serviceId)}" /></div>`;
  html += `<div class="form-field"><input id="ej-template" placeholder="EmailJS Template ID" value="${esc(S.adminAuth.emailjs.templateId)}" /></div>`;
  html += `<div class="form-field"><input id="ej-public" placeholder="EmailJS Public Key" value="${esc(S.adminAuth.emailjs.publicKey)}" /></div>`;
  html += `<button class="primary-btn" onclick="adminSaveEmailSettings()">儲存 Email 通知設定</button>`;
  html += `<button class="link-btn" style="margin-top:24px" onclick="adminLogout()">← 登出後台</button>`;
  html += `</div>`;
  return html;
}

function render() {
  if (S.loading) { document.getElementById("app").innerHTML = `<div class="loading-wrap">載入中…</div>`; return; }
  let body = "";
  if (S.tab === "book") body = renderBookTab();
  else if (S.tab === "manage") body = renderManageTab();
  else if (S.tab === "admin") body = S.isAdmin ? renderAdminPanel() : renderAdminLogin();
  document.getElementById("app").innerHTML = renderHeader() + body;
}

// ====== 事件處理（掛在 window 上，供 inline onclick 呼叫） ======
window.selectTab = (t) => { S.tab = t; render(); };

// 預約分頁
window.bookSelectDate = async (dateStr) => {
  S.book.selectedDate = dateStr; S.book.selectedSlot = null;
  await ensureBookings(dateStr);
  render();
};
window.bookSelectDuration = (v) => { S.book.duration = v; S.book.selectedSlot = null; render(); };
window.bookSelectSlot = (start) => { S.book.selectedSlot = { start, end: start + S.book.duration }; render(); };
window.bookReset = () => {
  S.book = { selectedDate: null, duration: 60, selectedSlot: null, success: null, error: "", submitting: false };
  render();
};
window.bookSubmit = async () => {
  const name = document.getElementById("bk-name").value.trim();
  const phone = document.getElementById("bk-phone").value.trim();
  const email = document.getElementById("bk-email").value.trim();
  const note = document.getElementById("bk-note").value.trim();
  const b = S.book;
  b.error = "";
  if (!name || !phone) { b.error = "請填寫姓名與手機號碼"; render(); return; }
  if (!/^09\d{8}$/.test(phone)) { b.error = "手機號碼格式不正確，請輸入 09 開頭的 10 碼手機號碼"; render(); return; }
  b.submitting = true; render();
  const latest = await refreshBookings(b.selectedDate);
  const conflict = latest.filter(x => x.status === "confirmed").some(x => {
    const bs = timeToMin(x.start), be = bs + x.duration;
    return b.selectedSlot.start < be && bs < b.selectedSlot.start + b.duration;
  });
  if (conflict) {
    b.error = "這個時段剛被其他客人預約走了，請重新選擇時段";
    b.submitting = false; b.selectedSlot = null; render(); return;
  }
  const record = {
    date: b.selectedDate, start: minToTime(b.selectedSlot.start), duration: b.duration,
    name, phone, email, note, status: "confirmed", createdAt: Date.now(),
  };
  const id = await addBooking(record);
  S.bookingsCache[b.selectedDate] = [...latest, { id, ...record }];
  await upsertCustomer({ name, phone, email });
  S.directory = await loadDirectory();
  await addNotification({ type: "new", date: record.date, start: record.start, name, phone, duration: b.duration });
  S.notifications = await loadNotifications();
  const dateLabel = formatDateCN(b.selectedDate);
  if (S.adminAuth.adminEmail) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: S.adminAuth.adminEmail, name, title: `新預約 ${dateLabel} ${record.start}`,
      message: `姓名：${name}\n電話：${phone}\n日期時間：${dateLabel} ${record.start}（${b.duration} 分鐘）\n備註：${note || "無"}`,
      replyEmail: email,
    });
  }
  if (email) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: email, name, title: "預約成功通知",
      message: `${name} 您好，您的預約已成立。\n日期時間：${dateLabel} ${record.start}（${b.duration} 分鐘）\n如需取消，請至預約系統的「查詢/取消」頁面用手機號碼查詢。`,
    });
  }
  b.success = { ...record }; b.submitting = false;
  render();
};

// 查詢/取消分頁
window.manageSearch = async () => {
  const phone = document.getElementById("mg-phone").value.trim();
  if (!phone) return;
  S.manage.searching = true; render();
  S.manage.results = await searchBookingsByPhone(phone);
  S.manage.searching = false; render();
};
window.manageCancel = async (id, date) => {
  const b = S.manage.results.find(x => x.id === id);
  if (!b) return;
  await cancelBookingDoc(id);
  if (S.bookingsCache[date]) S.bookingsCache[date] = S.bookingsCache[date].map(x => x.id === id ? { ...x, status: "cancelled" } : x);
  await addNotification({ type: "cancel", date: b.date, start: b.start, name: b.name, phone: b.phone, duration: b.duration });
  S.notifications = await loadNotifications();
  const dateLabel = formatDateCN(b.date);
  if (S.adminAuth.adminEmail) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: S.adminAuth.adminEmail, name: b.name, title: `預約取消 ${dateLabel} ${b.start}`,
      message: `客人取消了預約\n姓名：${b.name}\n電話：${b.phone}\n原預約時間：${dateLabel} ${b.start}`, replyEmail: b.email,
    });
  }
  if (b.email) {
    sendEmail(S.adminAuth.emailjs, { toEmail: b.email, name: b.name, title: "預約取消確認", message: `${b.name} 您好，您 ${dateLabel} ${b.start} 的預約已取消。` });
  }
  S.manage.results = S.manage.results.filter(x => x.id !== id);
  render();
};

// 後台登入/登出
window.adminLoginSubmit = () => {
  const pw = document.getElementById("admin-pw-input").value;
  if (pw === S.adminAuth.password) { S.isAdmin = true; S.admin.pwError = ""; ensureBookings(S.admin.viewDate).then(render); }
  else { S.admin.pwError = "密碼錯誤"; render(); }
};
window.adminLogout = () => { S.isAdmin = false; render(); };

// 幫客人快速預約
window.adminCustomerSearchInput = (value) => {
  S.admin.customerQuery = value; S.admin.pickedCustomer = null;
  document.getElementById("qb-matches").innerHTML = renderCustomerMatches();
};
window.adminPickCustomer = (phone) => {
  const c = S.directory.find(x => x.phone === phone);
  S.admin.pickedCustomer = c; S.admin.customerQuery = c.name;
  render();
};
window.adminUnpickCustomer = () => { S.admin.pickedCustomer = null; S.admin.customerQuery = ""; S.admin.qb = { date: null, duration: 60, slot: null, submitting: false, success: "", error: "" }; render(); };
window.adminNewCustomerConfirm = () => {
  const name = document.getElementById("nc-name").value.trim();
  const phone = document.getElementById("nc-phone").value.trim();
  const email = document.getElementById("nc-email").value.trim();
  if (!name || !/^09\d{8}$/.test(phone)) {
    document.getElementById("nc-err").innerHTML = `<div class="error-text">請填寫姓名，手機需為 09 開頭 10 碼</div>`;
    return;
  }
  S.admin.pickedCustomer = { name, phone, email };
  S.admin.customerQuery = name;
  render();
};
window.adminQbSelectDate = async (dateStr) => {
  S.admin.qb.date = dateStr; S.admin.qb.slot = null;
  await ensureBookings(dateStr);
  render();
};
window.adminQbSelectDuration = (v) => { S.admin.qb.duration = v; S.admin.qb.slot = null; render(); };
window.adminQbSelectSlot = (start) => { S.admin.qb.slot = { start }; render(); };
window.adminQbSubmit = async () => {
  const note = document.getElementById("qb-note")?.value.trim() || "";
  const qb = S.admin.qb;
  const cust = S.admin.pickedCustomer;
  qb.error = "";
  if (!cust) { qb.error = "請先從名冊選擇客人，或直接輸入新客人資料"; render(); return; }
  if (!qb.date || !qb.slot) { qb.error = "請選擇日期與時段"; render(); return; }
  qb.submitting = true; render();
  const latest = await refreshBookings(qb.date);
  const conflict = latest.filter(x => x.status === "confirmed").some(x => {
    const bs = timeToMin(x.start), be = bs + x.duration;
    return qb.slot.start < be && bs < qb.slot.start + qb.duration;
  });
  if (conflict) { qb.error = "這個時段剛被約走了，請重新選擇"; qb.submitting = false; qb.slot = null; render(); return; }
  const record = {
    date: qb.date, start: minToTime(qb.slot.start), duration: qb.duration,
    name: cust.name, phone: cust.phone, email: cust.email || "", note, status: "confirmed", createdAt: Date.now(),
  };
  const id = await addBooking(record);
  S.bookingsCache[qb.date] = [...latest, { id, ...record }];
  await upsertCustomer({ name: record.name, phone: record.phone, email: record.email });
  S.directory = await loadDirectory();
  if (record.email) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: record.email, name: record.name, title: "預約成功通知",
      message: `${record.name} 您好，師傅已為您安排預約。\n日期時間：${formatDateCN(qb.date)} ${record.start}（${qb.duration} 分鐘）`,
    });
  }
  qb.success = `已為 ${record.name} 預約 ${formatDateCN(qb.date)} ${record.start}`;
  S.admin.pickedCustomer = null; S.admin.customerQuery = "";
  S.admin.qb = { date: null, duration: 60, slot: null, submitting: false, success: qb.success, error: "" };
  render();
  setTimeout(() => { S.admin.qb.success = ""; render(); }, 4000);
};

// 後台：通知 / 預約清單 / 排班 / 休診 / 密碼 / Email
window.adminMarkAllRead = async () => {
  await markAllNotificationsRead(S.notifications);
  S.notifications = await loadNotifications();
  render();
};
window.adminSelectViewDate = async (dateStr) => {
  S.admin.viewDate = dateStr;
  await ensureBookings(dateStr);
  render();
};
window.adminCancelBooking = async (id, date) => {
  const list = S.bookingsCache[date] || [];
  const b = list.find(x => x.id === id);
  await cancelBookingDoc(id);
  S.bookingsCache[date] = list.map(x => x.id === id ? { ...x, status: "cancelled" } : x);
  if (b) {
    await addNotification({ type: "cancel-by-admin", date, start: b.start, name: b.name, phone: b.phone, duration: b.duration });
    S.notifications = await loadNotifications();
    if (b.email) {
      sendEmail(S.adminAuth.emailjs, {
        toEmail: b.email, name: b.name, title: "預約異動通知",
        message: `${b.name} 您好，您 ${formatDateCN(date)} ${b.start} 的預約已由師傅取消，如有疑問請直接與師傅聯繫。`,
      });
    }
  }
  render();
};
window.adminScheduleToggle = (key, checked) => { S.admin.scheduleDraft[key].open = checked; render(); };
window.adminScheduleWindowInput = (key, value) => { S.admin.scheduleDraft[key].windows = value; };
window.adminSaveSchedule = async () => {
  WEEKDAY_KEYS.forEach(key => {
    const el = document.getElementById(`sched-win-${key}`);
    if (el) S.admin.scheduleDraft[key].windows = el.value;
  });
  const ok = await setConfig("schedule", S.admin.scheduleDraft);
  if (ok) { S.schedule = JSON.parse(JSON.stringify(S.admin.scheduleDraft)); S.admin.savedTip = "排班已更新"; }
  else { S.admin.savedTip = "儲存失敗，請檢查網路連線後再試一次"; }
  render();
  setTimeout(() => { S.admin.savedTip = ""; render(); }, 3000);
};
window.adminAddClosedDate = async () => {
  const val = document.getElementById("closed-date-input").value;
  if (!val) return;
  const updated = Array.from(new Set([...S.closedDates, val])).sort();
  const ok = await setConfig("closedDates", { list: updated });
  if (ok) S.closedDates = updated;
  render();
};
window.adminRemoveClosedDate = async (d) => {
  const updated = S.closedDates.filter(x => x !== d);
  const ok = await setConfig("closedDates", { list: updated });
  if (ok) S.closedDates = updated;
  render();
};
window.adminSavePassword = async () => {
  const val = document.getElementById("new-pass-input").value.trim();
  if (!val) return;
  const newAuth = { ...S.adminAuth, password: val };
  const ok = await setConfig("adminAuth", newAuth);
  if (ok) { S.adminAuth = newAuth; S.admin.savedTip = "密碼已更新"; }
  else { S.admin.savedTip = "儲存失敗，請檢查網路連線後再試一次"; }
  render();
  setTimeout(() => { S.admin.savedTip = ""; render(); }, 3000);
};
window.adminSaveEmailSettings = async () => {
  const adminEmail = document.getElementById("admin-email-input").value.trim();
  const serviceId = document.getElementById("ej-service").value.trim();
  const templateId = document.getElementById("ej-template").value.trim();
  const publicKey = document.getElementById("ej-public").value.trim();
  const newAuth = { ...S.adminAuth, adminEmail, emailjs: { serviceId, templateId, publicKey } };
  const ok = await setConfig("adminAuth", newAuth);
  if (ok) { S.adminAuth = newAuth; S.admin.savedTip = "Email 通知設定已儲存"; }
  else { S.admin.savedTip = "儲存失敗，請檢查網路連線後再試一次"; }
  render();
  setTimeout(() => { S.admin.savedTip = ""; render(); }, 3000);
};

init();
</script>

</html>
