<script>
  (function () {
    var ua = navigator.userAgent || "";
    var isInApp = /FBAN|FBAV|Instagram|Line\//i.test(ua);
    var hintEl = document.getElementById("inapp-hint");
    if (isInApp && hintEl) {
      hintEl.innerHTML = '<div class="inapp-warning">偵測到你是用 Facebook / Instagram / LINE 內建瀏覽器打開的，這種瀏覽器有時候會卡住連不上。<br><br>請點畫面右上角或右下角的「⋯」或分享圖示，選「在瀏覽器中開啟」（Open in Safari / Chrome），會比較穩定。</div>';
    }
    setTimeout(function () {
      var appEl = document.getElementById("app");
      if (appEl && appEl.innerHTML.indexOf("載入中") !== -1 && hintEl && !isInApp) {
        if (navigator.onLine === false) {
          hintEl.innerHTML = '<div class="inapp-warning">偵測到目前沒有網路連線。請確認 Wi-Fi 或行動數據已開啟，網路恢復後畫面會自動載入。</div>';
        } else {
          hintEl.innerHTML = '<div class="inapp-warning">載入時間比較久，可能是網路不穩或瀏覽器擋住了連線。建議：確認網路連線，或換成 Safari / Chrome 開啟這個網址再試一次。</div>';
        }
      }
    }, 6000);

    function updateOfflineBanner() {
      var banner = document.getElementById("offline-banner");
      if (!banner) return;
      banner.style.display = navigator.onLine === false ? "flex" : "none";
    }
    window.addEventListener("online", updateOfflineBanner);
    window.addEventListener("offline", updateOfflineBanner);
    updateOfflineBanner();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function (e) {
          console.error("SW register failed", e);
        });
      });
    }
  })();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs,
  query, where, orderBy, limit, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ====== Firebase 設定：換成你自己的 firebaseConfig ======
const firebaseConfig = {
  apiKey: "AIzaSyDkLms4g5-UPuMQcFl0pvxGU8bsqdLEqA0",
  authDomain: "sian-customer-records.firebaseapp.com",
  projectId: "sian-customer-records",
  storageBucket: "sian-customer-records.firebasestorage.app",
  messagingSenderId: "408702062626",
  appId: "1:408702062626:web:5317965599bd8678feba7b",
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ====== 常數 ======
const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];
const WEEKDAY_KEYS = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
const DEFAULT_SCHEDULE = {
  sun: { open: false, windows: "" },
  mon: { open: true, windows: "10:00-12:00,18:30-21:00" },
  tue: { open: true, windows: "10:00-21:00" },
  wed: { open: true, windows: "10:00-21:00" },
  thu: { open: true, windows: "10:00-21:00" },
  fri: { open: true, windows: "10:00-12:00,18:30-21:00" },
  sat: { open: true, windows: "09:00-12:00,18:30-21:00" },
};
// 時長選項改為後台可自訂，不再寫死；預設值見 S.durations
const SEGMENTS = [
  { key: "morning", label: "早上 10-12", start: 600, end: 720 },
  { key: "afternoon", label: "下午 12-18", start: 720, end: 1080 },
  { key: "evening", label: "晚上 18-22", start: 1080, end: 1320 },
];
const ALWAYS_OPEN_SCHEDULE = WEEKDAY_KEYS.reduce((acc, k) => { acc[k] = { open: true, windows: "00:00-23:59" }; return acc; }, {});
function isDateFullyClosed(closedDates, dateStr) {
  const segs = closedDates[dateStr];
  if (!segs || segs.length === 0) return false;
  return segs.includes("full") || (segs.includes("morning") && segs.includes("afternoon") && segs.includes("evening"));
}

// ====== 工具函式 ======
const pad = (n) => String(n).padStart(2, "0");
const toDateStr = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const timeToMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
const minToTime = (m) => `${pad(Math.floor(m / 60))}:${pad(m % 60)}`;
const parseWindows = (str) => (str || "").split(",").map(s => s.trim()).filter(Boolean)
  .map(s => { const [start, end] = s.split("-").map(x => x.trim()); return { start, end }; })
  .filter(w => w.start && w.end);
const genId = (p = "") => p + Math.random().toString(36).slice(2, 8).toUpperCase();
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
function formatDateCN(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function googleCalendarLink(b) {
  const startMin = timeToMin(b.start);
  const endMin = startMin + b.duration;
  const y = b.date.replace(/-/g, "");
  const fmt = (m) => y + "T" + pad(Math.floor(m / 60)) + pad(m % 60) + "00";
  const dates = `${fmt(startMin)}/${fmt(endMin)}`;
  const text = encodeURIComponent(`${b.name} - 顯德筋絡調理室${b.therapistName ? "（" + b.therapistName + "）" : ""}`);
  const details = encodeURIComponent(`客人：${b.name}\n電話：${b.phone}${b.price != null ? "\n金額：$" + b.price : ""}${b.note ? "\n備註：" + b.note : ""}`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${dates}&details=${details}`;
}
function generateSlots(dateStr, durationMin, schedule, bookings, therapistId, closedSegs, blocks) {
  const d = new Date(dateStr + "T00:00:00");
  const wk = WEEKDAY_KEYS[d.getDay()];
  const daySchedule = schedule[wk];
  if (!daySchedule || !daySchedule.open) return [];
  const windows = parseWindows(daySchedule.windows);
  const confirmed = bookings.filter(b => b.status === "confirmed" && (!therapistId || b.therapistId === therapistId));
  const closedRanges = (closedSegs || []).includes("full")
    ? [{ start: 0, end: 1440 }]
    : SEGMENTS.filter(s => (closedSegs || []).includes(s.key));
  const blockRanges = (blocks || [])
    .filter(bl => !therapistId || bl.therapistId === therapistId)
    .map(bl => ({ start: timeToMin(bl.start), end: timeToMin(bl.end) }));
  const allClosedRanges = closedRanges.concat(blockRanges);
  const slots = [];
  const now = new Date();
  const isToday = toDateStr(now) === dateStr;
  const nowMin = now.getHours() * 60 + now.getMinutes();
  windows.forEach(w => {
    const wStart = timeToMin(w.start), wEnd = timeToMin(w.end);
    for (let s = wStart; s + durationMin <= wEnd; s += 30) {
      if (isToday && s <= nowMin) continue;
      const inClosedSeg = allClosedRanges.some(r => s < r.end && r.start < s + durationMin);
      if (inClosedSeg) continue;
      const conflict = confirmed.some(b => {
        const bs = timeToMin(b.start), be = bs + b.duration;
        return s < be && bs < s + durationMin;
      });
      slots.push({ start: s, end: s + durationMin, booked: conflict });
    }
  });
  return slots;
}
async function sendEmail(emailjsConfig, { toEmail, name, title, message, replyEmail }) {
  if (!emailjsConfig?.serviceId || !emailjsConfig?.templateId || !emailjsConfig?.publicKey || !toEmail) return;
  try {
    await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: emailjsConfig.serviceId, template_id: emailjsConfig.templateId, user_id: emailjsConfig.publicKey,
        template_params: {
          to_email: toEmail, name: name || "", title: title || "", message: message || "",
          email: replyEmail || "", time: new Date().toLocaleString("zh-TW", { timeZone: "Asia/Taipei" }),
        },
      }),
    });
  } catch (e) { console.error("email send failed", e); }
}

// ====== Firestore 存取 ======
async function getConfig(key, fallback) {
  try {
    const snap = await getDoc(doc(db, "config", key));
    return snap.exists() ? snap.data() : fallback;
  } catch (e) { console.error(e); return fallback; }
}
async function setConfig(key, data) {
  try { await setDoc(doc(db, "config", key), data); return true; }
  catch (e) { console.error(e); return false; }
}
async function loadBookingsForDate(dateStr) {
  try {
    const q = query(collection(db, "bookings"), where("date", "==", dateStr));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error(e); return []; }
}
async function addBooking(record) {
  const ref = await addDoc(collection(db, "bookings"), record);
  return ref.id;
}
async function cancelBookingDoc(id) {
  await updateDoc(doc(db, "bookings", id), { status: "cancelled" });
}
async function searchBookingsByPhone(phone) {
  try {
    const q = query(collection(db, "bookings"), where("phone", "==", phone), where("status", "==", "confirmed"));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.date + a.start).localeCompare(b.date + b.start));
  } catch (e) { console.error(e); return []; }
}
async function searchBookingsByDateRange(startDate, endDate) {
  try {
    const q = query(collection(db, "bookings"), where("date", ">=", startDate), where("date", "<=", endDate), orderBy("date"));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.date + a.start).localeCompare(b.date + b.start));
  } catch (e) { console.error(e); return []; }
}
async function loadBlocksForDate(dateStr) {
  try {
    const q = query(collection(db, "blocks"), where("date", "==", dateStr));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error(e); return []; }
}
async function addBlockDoc(rec) {
  const ref = await addDoc(collection(db, "blocks"), rec);
  return ref.id;
}
async function removeBlockDoc(id) {
  await deleteDoc(doc(db, "blocks", id));
}
async function addNotification(note) {
  await addDoc(collection(db, "notifications"), { read: false, timestamp: Date.now(), ...note });
}
async function loadNotifications() {
  try {
    const q = query(collection(db, "notifications"), orderBy("timestamp", "desc"), limit(50));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error(e); return []; }
}
async function markAllNotificationsRead(list) {
  await Promise.all(list.filter(n => !n.read).map(n => updateDoc(doc(db, "notifications", n.id), { read: true })));
}
async function upsertCustomer(rec) {
  if (!rec.phone) return;
  try { await setDoc(doc(db, "customers", rec.phone), { name: rec.name, phone: rec.phone, email: rec.email || "", birthday: rec.birthday || "", lastBooked: Date.now() }, { merge: true }); }
  catch (e) { console.error(e); }
}
async function loadDirectory() {
  try {
    const q = query(collection(db, "customers"), orderBy("lastBooked", "desc"), limit(500));
    const snap = await getDocs(q);
    return snap.docs.map(d => d.data());
  } catch (e) { console.error(e); return []; }
}
async function loadTherapists() {
  try {
    const snap = await getDocs(collection(db, "therapists"));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error(e); return []; }
}
async function addTherapistDoc(rec) {
  const ref = await addDoc(collection(db, "therapists"), rec);
  return ref.id;
}
async function updateTherapistDoc(id, data) {
  await updateDoc(doc(db, "therapists", id), data);
}
async function removeTherapistDoc(id) {
  await deleteDoc(doc(db, "therapists", id));

async function init() {
  S.schedule = await getConfig("schedule", DEFAULT_SCHEDULE);
  const cd = await getConfig("closedDates", { entries: {} });
  if (cd.entries) {
    S.closedDates = cd.entries;
  } else if (cd.list) {
    // 舊格式相容：整天休診的日期陣列，轉成新格式
    S.closedDates = {};
    cd.list.forEach(d => { S.closedDates[d] = ["full"]; });
  } else {
    S.closedDates = {};
  }
  S.adminAuth = await getConfig("adminAuth", S.adminAuth);
  if (!S.adminAuth.studioName) S.adminAuth.studioName = "顯德筋絡調理室";
  if (!S.adminAuth.studioSubtitle) S.adminAuth.studioSubtitle = "線上預約 · 三重";
  document.title = S.adminAuth.studioName + " - 線上預約";
  S.notifications = await loadNotifications();
  S.directory = await loadDirectory();
  S.therapists = await loadTherapists();
  const durCfg = await getConfig("durations", { list: S.durations });
  if (durCfg.list && durCfg.list.length > 0) S.durations = durCfg.list;
  if (S.therapists.length === 0) {
    const id = await addTherapistDoc({ name: "師傅 吳", email: S.adminAuth.adminEmail || "", schedule: S.schedule });
    S.therapists = [{ id, name: "師傅 吳", email: S.adminAuth.adminEmail || "", schedule: S.schedule }];
  } else {
    for (const t of S.therapists) {
      if (!t.schedule) {
        t.schedule = JSON.parse(JSON.stringify(S.schedule));
        updateTherapistDoc(t.id, { schedule: t.schedule });
      }
    }
  }
  S.admin.scheduleTherapistId = S.therapists[0]?.id || null;
  S.admin.scheduleDraft = S.admin.scheduleTherapistId
    ? JSON.parse(JSON.stringify(S.therapists.find(t => t.id === S.admin.scheduleTherapistId).schedule))
    : JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
  S.loading = false;
  render();
}

function dateStripHTML(selected, closedDates, schedule, days, handler) {
  const today = new Date(); today.setHours(0,0,0,0);
  let html = `<div class="date-strip">`;
  for (let i = 0; i < days; i++) {
    const d = new Date(today); d.setDate(d.getDate() + i);
    const dateStr = toDateStr(d);
    const wk = WEEKDAY_KEYS[d.getDay()];
    const scheduleClosed = !schedule[wk]?.open || parseWindows(schedule[wk]?.windows).length === 0;
    const fullyClosed = isDateFullyClosed(closedDates, dateStr);
    const partiallyClosed = !fullyClosed && closedDates[dateStr] && closedDates[dateStr].length > 0;
    const isClosed = scheduleClosed || fullyClosed;
    const isSel = selected === dateStr;
    html += `<button class="date-card ${isSel ? "selected" : ""} ${isClosed ? "closed" : ""}"
      ${isClosed ? "disabled" : `onclick="${handler}('${dateStr}')"`}>
      <div class="wd">${WEEKDAYS[d.getDay()]}</div><div class="num">${d.getDate()}</div>
      ${isClosed ? '<div class="closed-lbl">休</div>' : partiallyClosed ? '<div class="closed-lbl">部分休</div>' : ""}
    </button>`;
  }
  html += `</div>`;
  return html;
}
function slotGridHTML(slots, selectedSlot, selectHandler) {
  if (slots.length === 0) return `<div class="empty-box">這個時長在此日期沒有可預約的時段，請換個日期或時長試試。</div>`;
  let html = `<div class="slot-grid">`;
  slots.forEach(s => {
    const isSel = selectedSlot && selectedSlot.start === s.start;
    html += `<button class="slot-btn ${s.booked ? "booked" : ""} ${isSel ? "selected" : ""}"
      ${s.booked ? "disabled" : `onclick="${selectHandler}(${s.start})"`}>${minToTime(s.start)}</button>`;
  });
  html += `</div>`;
  return html;
}
function durationRowHTML(current, handler) {
  return `<div class="duration-row">${S.durations.map(d =>
    `<button class="duration-btn ${current === d.minutes ? "active" : ""}" onclick="${handler}(${d.minutes})">${d.minutes} 分鐘<br><span style="font-size:12px;opacity:.85">$${d.price}</span></button>`
  ).join("")}</div>`;
}

          <button class="status-btn ${b.paid ? "on-paid" : ""}" onclick="adminToggleStatus('${b.id}','${a.viewDate}','paid')">${b.paid ? "✓ 已付款" : "未付款"}</button>

  html += `<div class="divider"></div>`;
  html += `<div class="section-label">每週排班設定</div>`;
  html += `<p class="hint-text">每位師傅可以有自己的上班時間。先選師傅，再改時間。格式：開始-結束，多段用逗號分隔，例如 10:00-12:00,18:30-21:00</p>`;

      <label class="schedule-check-label"><input type="checkbox" id="sched-open-${key}" ${d.open ? "checked" : ""} onchange="adminScheduleToggle('${key}', this.checked)"> 週${WEEKDAYS[idx]}</label>

  html += `<button class="primary-btn" onclick="adminSaveSchedule()">儲存這位師傅的排班</button>`;
  if (a.savedTip) html += `<div class="saved-tip">${esc(a.savedTip)}</div>`;
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">公休 / 特定日期休診</div>`;
  html += `<p class="hint-text">選日期＋勾選要休息的時段，不用去改每週排班的時間。同一天可以只勾早上、只勾下午，或勾整天。</p>`;
  html += `<div class="form-field"><input type="date" id="closed-date-input" /></div>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">`;
  SEGMENTS.forEach(seg => {
    html += `<label style="display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #E7DFCE;border-radius:8px;padding:8px 10px;font-size:13px">
      <input type="checkbox" class="closed-seg-check" value="${seg.key}" /> ${seg.label}
    </label>`;
  });
  html += `<label style="display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #E7DFCE;border-radius:8px;padding:8px 10px;font-size:13px">
    <input type="checkbox" id="closed-seg-full" onchange="document.querySelectorAll('.closed-seg-check').forEach(c=>c.checked=this.checked)" /> 整天
  </label>`;
  html += `</div>`;
  html += `<button class="primary-btn" onclick="adminAddClosedDate()">新增 / 更新休診設定</button>`;
  if (a.closedTip) html += `<div class="saved-tip">${esc(a.closedTip)}</div>`;
  html += `<div style="margin-top:10px">`;
  const closedEntries = Object.entries(S.closedDates).filter(([, segs]) => segs && segs.length > 0);
  if (closedEntries.length === 0) {
    html += `<div class="empty-box">目前沒有設定休診日。</div>`;
  } else {
    closedEntries.sort((a2, b2) => a2[0].localeCompare(b2[0])).forEach(([d, segs]) => {
      const label = segs.includes("full") || (segs.includes("morning") && segs.includes("afternoon") && segs.includes("evening"))
        ? "整天"
        : segs.map(k => SEGMENTS.find(s => s.key === k)?.label || k).join("、");
      html += `<div class="closed-date-row"><span>${formatDateCN(d)} · ${label}</span><button class="icon-btn" onclick="adminRemoveClosedDate('${d}')">🗑</button></div>`;
    });
  }
  html += `</div>`;
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">師傅個別時段鎖定</div>`;
  html += `<p class="hint-text">選師傅＋日期＋幾點到幾點，那個時段就不會出現在該師傅的預約選項裡，不用再創假預約佔位。</p>`;
  html += `<div class="duration-row" style="flex-wrap:wrap">` + S.therapists.map(t =>
    `<button class="duration-btn ${a.block.therapistId === t.id ? "active" : ""}" onclick="adminBlockSelectTherapist('${t.id}')">${esc(t.name)}</button>`
  ).join("") + `</div>`;
  html += `<div class="form-field"><input type="date" id="block-date-input" value="${esc(a.block.date || "")}" onchange="adminBlockDateChange(this.value)" /></div>`;
  html += `<div style="display:flex;gap:8px;margin-bottom:10px">
    <div class="form-field" style="flex:1;margin-bottom:0">開始 <input type="time" id="block-start-input" value="${esc(a.block.start)}" /></div>
    <div class="form-field" style="flex:1;margin-bottom:0">結束 <input type="time" id="block-end-input" value="${esc(a.block.end)}" /></div>
  </div>`;
  html += `<button class="primary-btn" onclick="adminAddBlock()">鎖定這個時段</button>`;
  if (a.block.tip) html += `<div class="saved-tip">${esc(a.block.tip)}</div>`;
  if (a.block.date && a.block.therapistId) {
    const dayBlocks = (S.blocksCache[a.block.date] || []).filter(bl => bl.therapistId === a.block.therapistId);
    html += `<div style="margin-top:10px">`;
    if (dayBlocks.length === 0) {
      html += `<div class="empty-box">這位師傅這天目前沒有鎖定時段。</div>`;
    } else {
      dayBlocks.sort((x, y) => x.start.localeCompare(y.start)).forEach(bl => {
        html += `<div class="closed-date-row"><span>${formatDateCN(bl.date)} ${bl.start}-${bl.end} · ${esc(bl.therapistName)}</span><button class="icon-btn" onclick="adminRemoveBlock('${bl.id}','${bl.date}')">🗑</button></div>`;
      });
    }
    html += `</div>`;
  }
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">修改後台密碼</div>`;
  html += `<div class="form-field"><input id="new-pass-input" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="輸入新密碼" /></div>`;
  html += `<button class="primary-btn" onclick="adminSavePassword()">更新密碼</button>`;
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">Email 通知設定</div>`;
  html += `<p class="hint-text">要用 emailjs.com（免費）才能自動寄信，需要 Service ID、Template ID、Public Key 三組值。設定完成後，客人預約/取消時會自動寄信到你的信箱；客人有填 Email 的話也會收到確認信。</p>`;
  html += `<div class="form-field"><input id="admin-email-input" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="你的收件信箱" value="${esc(S.adminAuth.adminEmail)}" /></div>`;
  html += `<div class="form-field"><input id="ej-service" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="EmailJS Service ID" value="${esc(S.adminAuth.emailjs.serviceId)}" /></div>`;
  html += `<div class="form-field"><input id="ej-template" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="EmailJS Template ID" value="${esc(S.adminAuth.emailjs.templateId)}" /></div>`;
  html += `<div class="form-field"><input id="ej-public" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="EmailJS Public Key" value="${esc(S.adminAuth.emailjs.publicKey)}" /></div>`;
  html += `<button class="primary-btn" onclick="adminSaveEmailSettings()">儲存 Email 通知設定</button>`;
  html += `<button class="primary-btn" style="background:#7C9885;margin-top:8px" onclick="adminSendTestEmail()">寄送測試信</button>`;
  if (a.emailTestTip) html += `<div class="saved-tip">${esc(a.emailTestTip)}</div>`;
  html += `<div class="divider"></div>`;
  html += `<div class="section-label">外觀設定</div>`;
  html += `<p class="hint-text">店名跟頁首小字，之後改名或搬家都可以直接在這裡改，不用重新上傳程式碼。</p>`;
  html += `<div class="form-field">🏷️ <input id="studio-name-input" placeholder="店名" value="${esc(S.adminAuth.studioName)}" /></div>`;
  html += `<div class="form-field">📍 <input id="studio-subtitle-input" placeholder="頁首小字（例如：線上預約 · 三重）" value="${esc(S.adminAuth.studioSubtitle)}" /></div>`;
  html += `<button class="primary-btn" onclick="adminSaveStudioInfo()">儲存店名設定</button>`;
  if (a.studioTip) html += `<div class="saved-tip">${esc(a.studioTip)}</div>`;
  html += `<p class="hint-text" style="margin-top:16px">貼上一張已經上傳到網路上的圖片網址（例如 Imgur、Google 相簿的公開連結），就會顯示在頁首的圓形頭像位置。</p>`;
  html += `<div class="form-field"><input id="logo-url-input" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="圖片網址（https://...）" value="${esc(S.adminAuth.logoUrl || "")}" /></div>`;
  html += `<button class="primary-btn" onclick="adminSaveLogo()">儲存頭像圖片</button>`;
  if (a.logoTip) html += `<div class="saved-tip">${esc(a.logoTip)}</div>`;
  html += `<button class="link-btn" style="margin-top:24px" onclick="adminLogout()">← 登出後台</button>`;
  html += `</div>`;
  return html;
}

function render() {
  if (S.loading) { document.getElementById("app").innerHTML = `<div class="loading-wrap">載入中…</div>`; return; }
  let body = "";
  if (S.tab === "book") body = renderBookTab();
  else if (S.tab === "manage") body = renderManageTab();
  else if (S.tab === "admin") body = S.isAdmin ? renderAdminPanel() : renderAdminLogin();
  document.getElementById("app").innerHTML = renderHeader() + body;
}

// ====== 事件處理（掛在 window 上，供 inline onclick 呼叫） ======
window.selectTab = (t) => { S.tab = t; render(); };

// 預約分頁
window.bookSelectTherapist = (id) => { S.book.therapistId = id; S.book.selectedDate = null; S.book.selectedSlot = null; render(); };
window.bookSelectDate = async (dateStr) => {
  S.book.selectedDate = dateStr; S.book.selectedSlot = null;
  await Promise.all([ensureBookings(dateStr), ensureBlocks(dateStr)]);
  render();
};
window.bookSelectDuration = (v) => { S.book.duration = v; S.book.selectedSlot = null; render(); };
window.bookSelectSlot = (start) => { S.book.selectedSlot = { start, end: start + S.book.duration }; render(); };
window.bookReset = () => {
  const keepTherapist = S.therapists.length === 1 ? S.therapists[0].id : null;
  S.book = { therapistId: keepTherapist, selectedDate: null, duration: 60, selectedSlot: null, success: null, error: "", submitting: false };
  render();
};
window.bookSubmit = async () => {
  const name = document.getElementById("bk-name").value.trim();
  const phone = document.getElementById("bk-phone").value.trim();
  const email = document.getElementById("bk-email").value.trim();
  const birthday = document.getElementById("bk-birthday").value;
  const note = document.getElementById("bk-note").value.trim();
  const b = S.book;
  b.error = "";
  if (!name || !phone) { b.error = "請填寫姓名與手機號碼"; render(); return; }
  if (!/^09\d{8}$/.test(phone)) { b.error = "手機號碼格式不正確，請輸入 09 開頭的 10 碼手機號碼"; render(); return; }
  b.submitting = true; render();
  const latest = await refreshBookings(b.selectedDate);
  const conflict = latest.filter(x => x.status === "confirmed" && x.therapistId === b.therapistId).some(x => {
    const bs = timeToMin(x.start), be = bs + x.duration;
    return b.selectedSlot.start < be && bs < b.selectedSlot.start + b.duration;
  });
  if (conflict) {
    b.error = "這個時段剛被其他客人預約走了，請重新選擇時段";
    b.submitting = false; b.selectedSlot = null; render(); return;
  }
  const therapist = S.therapists.find(t => t.id === b.therapistId) || {};
  const record = {
    date: b.selectedDate, start: minToTime(b.selectedSlot.start), duration: b.duration, price: S.durations.find(d => d.minutes === b.duration)?.price ?? null,
    name, phone, email, note, status: "confirmed", createdAt: Date.now(), arrived: false, paid: false,
    therapistId: b.therapistId, therapistName: therapist.name || "", therapistEmail: therapist.email || "",
  };
  const id = await addBooking(record);
  S.bookingsCache[b.selectedDate] = [...latest, { id, ...record }];
  await upsertCustomer({ name, phone, email, birthday });
  S.directory = await loadDirectory();
  await addNotification({ type: "new", date: record.date, start: record.start, name, phone, duration: b.duration, therapistName: record.therapistName });
  S.notifications = await loadNotifications();
  const dateLabel = formatDateCN(b.selectedDate);
  if (record.therapistEmail) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: record.therapistEmail, name, title: `新預約 ${dateLabel} ${record.start}`,
      message: `姓名：${name}\n電話：${phone}\n日期時間：${dateLabel} ${record.start}（${b.duration} 分鐘）\n備註：${note || "無"}`,
      replyEmail: email,
    });
  }
  if (email) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: email, name, title: "預約成功通知",
      message: `${name} 您好，您的預約已成立。\n師傅：${record.therapistName}\n日期時間：${dateLabel} ${record.start}（${b.duration} 分鐘）\n如需取消，請至預約系統的「查詢/取消」頁面用手機號碼查詢。`,
    });
  }
  b.success = { ...record }; b.submitting = false;
  render();
};

// 查詢/取消分頁
window.manageSearch = async () => {
  const phone = document.getElementById("mg-phone").value.trim();
  if (!phone) return;
  S.manage.searching = true; render();
  S.manage.results = await searchBookingsByPhone(phone);
  S.manage.searching = false; render();
};
window.manageCancel = async (id, date) => {
  const b = S.manage.results.find(x => x.id === id);
  if (!b) return;
  await cancelBookingDoc(id);
  if (S.bookingsCache[date]) S.bookingsCache[date] = S.bookingsCache[date].map(x => x.id === id ? { ...x, status: "cancelled" } : x);
  await addNotification({ type: "cancel", date: b.date, start: b.start, name: b.name, phone: b.phone, duration: b.duration, therapistName: b.therapistName });
  S.notifications = await loadNotifications();
  const dateLabel = formatDateCN(b.date);
  if (b.therapistEmail) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: b.therapistEmail, name: b.name, title: `預約取消 ${dateLabel} ${b.start}`,
      message: `客人取消了預約\n姓名：${b.name}\n電話：${b.phone}\n原預約時間：${dateLabel} ${b.start}`, replyEmail: b.email,
    });
  }
  if (b.email) {
    sendEmail(S.adminAuth.emailjs, { toEmail: b.email, name: b.name, title: "預約取消確認", message: `${b.name} 您好，您 ${dateLabel} ${b.start} 的預約已取消。` });
  }
  S.manage.results = S.manage.results.filter(x => x.id !== id);
  render();
};

window.adminQbSubmit = async () => {
  const note = document.getElementById("qb-note")?.value.trim() || "";
  const qb = S.admin.qb;
  const cust = S.admin.pickedCustomer;
  qb.error = "";
  if (!cust) { qb.error = "請先從名冊選擇客人，或直接輸入新客人資料"; render(); return; }
  if (!qb.therapistId) { qb.error = "請選擇師傅"; render(); return; }
  if (!qb.date || !qb.slot) { qb.error = "請選擇日期與時段"; render(); return; }
  qb.submitting = true; render();
  const latest = await refreshBookings(qb.date);
  const conflict = latest.filter(x => x.status === "confirmed" && x.therapistId === qb.therapistId).some(x => {
    const bs = timeToMin(x.start), be = bs + x.duration;
    return qb.slot.start < be && bs < qb.slot.start + qb.duration;
  });
  if (conflict) { qb.error = "這個時段剛被約走了，請重新選擇"; qb.submitting = false; qb.slot = null; render(); return; }
  const therapist = S.therapists.find(t => t.id === qb.therapistId) || {};
  const record = {
    date: qb.date, start: minToTime(qb.slot.start), duration: qb.duration, price: S.durations.find(d => d.minutes === qb.duration)?.price ?? null,
    name: cust.name, phone: cust.phone, email: cust.email || "", note, status: "confirmed", createdAt: Date.now(), arrived: false, paid: false,
    therapistId: qb.therapistId, therapistName: therapist.name || "", therapistEmail: therapist.email || "",
  };
  const id = await addBooking(record);
  S.bookingsCache[qb.date] = [...latest, { id, ...record }];
  await upsertCustomer({ name: record.name, phone: record.phone, email: record.email, birthday: cust.birthday });
  S.directory = await loadDirectory();
  if (record.email) {
    sendEmail(S.adminAuth.emailjs, {
      toEmail: record.email, name: record.name, title: "預約成功通知",
      message: `${record.name} 您好，師傅已為您安排預約。\n師傅：${record.therapistName}\n日期時間：${formatDateCN(qb.date)} ${record.start}（${qb.duration} 分鐘）`,
    });
  }
  qb.success = `已為 ${record.name} 預約 ${formatDateCN(qb.date)} ${record.start}`;
  S.admin.pickedCustomer = null; S.admin.customerQuery = "";
  S.admin.qb = { therapistId: S.therapists.length === 1 ? S.therapists[0].id : null, date: null, duration: 60, slot: null, submitting: false, success: qb.success, error: "" };
  render();
  setTimeout(() => { S.admin.qb.success = ""; render(); }, 4000);
};

// 後台：通知 / 預約清單 / 排班 / 休診 / 密碼 / Email
window.adminSendTestEmail = async () => {
  const adminEmail = document.getElementById("admin-email-input").value.trim();
  const serviceId = document.getElementById("ej-service").value.trim();
  const templateId = document.getElementById("ej-template").value.trim();
  const publicKey = document.getElementById("ej-public").value.trim();
  if (!adminEmail || !serviceId || !templateId || !publicKey) {
    S.admin.emailTestTip = "請先填完信箱與三組 EmailJS 值再測試";
    render(); return;
  }
  S.admin.emailTestTip = "測試信寄送中…";
  render();
  try {
    const res = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: serviceId, template_id: templateId, user_id: publicKey,
        template_params: {
          to_email: adminEmail, name: "測試訊息", title: "這是一封測試信",
          message: "如果你收到這封信，代表 Email 通知設定成功了！",
          email: "", time: new Date().toLocaleString("zh-TW", { timeZone: "Asia/Taipei" }),
        },
      }),
    });
    if (res.ok) S.admin.emailTestTip = "已送出，請去信箱確認（含垃圾郵件匣）";
    else {
      const t = await res.text();
      S.admin.emailTestTip = `寄送失敗：${t.slice(0, 150)}`;
    }
  } catch (e) {
    S.admin.emailTestTip = "寄送失敗，請檢查網路連線";
  }
  render();
};
window.adminHistorySearch = async () => {
  const month = document.getElementById("history-month-input").value;
  if (!month) return;
  S.admin.history.month = month;
  S.admin.history.searching = true;
  render();
  const [y, m] = month.split("-").map(Number);
  const startDate = `${month}-01`;
  const lastDay = new Date(y, m, 0).getDate();
  const endDate = `${month}-${pad(lastDay)}`;
  S.admin.history.results = await searchBookingsByDateRange(startDate, endDate);
  S.admin.history.searching = false;
  render();
};
window.adminSaveStudioInfo = async () => {
  const studioName = document.getElementById("studio-name-input").value.trim();
  const studioSubtitle = document.getElementById("studio-subtitle-input").value.trim();
  if (!studioName) { S.admin.studioTip = "店名不能空白"; render(); return; }
  const newAuth = { ...S.adminAuth, studioName, studioSubtitle };
  const ok = await setConfig("adminAuth", newAuth);
  if (ok) { S.adminAuth = newAuth; S.admin.studioTip = "店名已更新"; document.title = studioName + " - 線上預約"; }
  else { S.admin.studioTip = "儲存失敗，請檢查網路連線後再試一次"; }
  render();
  setTimeout(() => { S.admin.studioTip = ""; render(); }, 3000);
};
window.adminSaveLogo = async () => {
  const logoUrl = document.getElementById("logo-url-input").value.trim();
  const newAuth = { ...S.adminAuth, logoUrl };
  const ok = await setConfig("adminAuth", newAuth);
  if (ok) { S.adminAuth = newAuth; S.admin.logoTip = "頭像已更新"; }
  else { S.admin.logoTip = "儲存失敗，請檢查網路連線後再試一次"; }
  render();
  setTimeout(() => { S.admin.logoTip = ""; render(); }, 3000);
};
window.adminDurationChange = (idx, field, value) => {
  const n = parseInt(value, 10);
  if (!isNaN(n)) S.durations[idx][field] = n;
};
window.adminAddDuration = () => {
  S.durations.push({ minutes: 30, price: 0 });
  render();
};
window.adminRemoveDuration = (idx) => {
  if (S.durations.length <= 1) { S.admin.priceTip = "至少要保留一個時長選項"; render(); return; }
  S.durations.splice(idx, 1);
  render();
};
window.adminSaveDurations = async () => {
  const sorted = [...S.durations].sort((a2, b2) => a2.minutes - b2.minutes);
  const ok = await setConfig("durations", { list: sorted });
  if (ok) { S.durations = sorted; S.admin.priceTip = "時長與價格已更新"; }
  else { S.admin.priceTip = "儲存失敗，請檢查網路連線後再試一次"; }
  render();
  setTimeout(() => { S.admin.priceTip = ""; render(); }, 3000);
};
window.adminAddTherapist = async () => {
  const name = document.getElementById("new-therapist-name").value.trim();
  const email = document.getElementById("new-therapist-email").value.trim();
  if (!name) { S.admin.therapistTip = "請輸入師傅姓名"; render(); return; }
  const schedule = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
  const id = await addTherapistDoc({ name, email, schedule });
  S.therapists.push({ id, name, email, schedule });
  S.admin.therapistTip = "已新增師傅";
  render();
  setTimeout(() => { S.admin.therapistTip = ""; render(); }, 2500);
};
window.adminEditTherapist = (id) => { S.admin.editingTherapistId = id; render(); };
window.adminCancelTherapistEdit = () => { S.admin.editingTherapistId = null; render(); };
window.adminSaveTherapistEdit = async (id) => {
  const name = document.getElementById("edit-therapist-name").value.trim();
  const email = document.getElementById("edit-therapist-email").value.trim();
  if (!name) { S.admin.therapistTip = "師傅姓名不能空白"; render(); return; }
  await updateTherapistDoc(id, { name, email });
  const t = S.therapists.find(x => x.id === id);
  if (t) { t.name = name; t.email = email; }
  S.admin.editingTherapistId = null;
  S.admin.therapistTip = "已更新師傅資料";
  render();
  setTimeout(() => { S.admin.therapistTip = ""; render(); }, 2500);
};
window.adminRemoveTherapist = async (id) => {
  await removeTherapistDoc(id);
  S.therapists = S.therapists.filter(t => t.id !== id);
  render();
};
window.adminMarkAllRead = async () => {
  await markAllNotificationsRead(S.notifications);
  S.notifications = await loadNotifications();
  render();
};
window.adminSelectViewDate = async (dateStr) => {
  S.admin.viewDate = dateStr;
  await ensureBookings(dateStr);
  render();
};
window.adminToggleStatus = async (id, date, field) => {
  const list = S.bookingsCache[date] || [];
  const b = list.find(x => x.id === id);
  if (!b) return;
  const newVal = !b[field];
  try {
    await updateDoc(doc(db, "bookings", id), { [field]: newVal });
    S.bookingsCache[date] = list.map(x => x.id === id ? { ...x, [field]: newVal } : x);
  } catch (e) { console.error(e); }
  render();
};
window.adminCancelBooking = async (id, date) => {
  const list = S.bookingsCache[date] || [];
  const b = list.find(x => x.id === id);
  await cancelBookingDoc(id);
  S.bookingsCache[date] = list.map(x => x.id === id ? { ...x, status: "cancelled" } : x);
  if (b) {
    await addNotification({ type: "cancel-by-admin", date, start: b.start, name: b.name, phone: b.phone, duration: b.duration });
    S.notifications = await loadNotifications();
    if (b.email) {
      sendEmail(S.adminAuth.emailjs, {
        toEmail: b.email, name: b.name, title: "預約異動通知",
        message: `${b.name} 您好，您 ${formatDateCN(date)} ${b.start} 的預約已由師傅取消，如有疑問請直接與師傅聯繫。`,
      });
    }
  }
  render();
};
window.adminSelectScheduleTherapist = (id) => {
  const t = S.therapists.find(x => x.id === id);
  if (!t) return;
  S.admin.scheduleTherapistId = id;
  S.admin.scheduleDraft = JSON.parse(JSON.stringify(t.schedule || DEFAULT_SCHEDULE));
  render();
};
window.adminScheduleToggle = (key, checked) => { S.admin.scheduleDraft[key].open = checked; render(); };
window.adminScheduleWindowInput = (key, value) => { S.admin.scheduleDraft[key].windows = value; };
window.adminSaveSchedule = async () => {
  WEEKDAY_KEYS.forEach(key => {
    const el = document.getElementById(`sched-win-${key}`);
    if (el) S.admin.scheduleDraft[key].windows = el.value;
  });
  const tid = S.admin.scheduleTherapistId;
  if (!tid) { S.admin.savedTip = "找不到師傅"; render(); return; }
  try {
    await updateTherapistDoc(tid, { schedule: S.admin.scheduleDraft });
    const t = S.therapists.find(x => x.id === tid);
    if (t) t.schedule = JSON.parse(JSON.stringify(S.admin.scheduleDraft));
    S.admin.savedTip = "排班已更新";
  } catch (e) {
    S.admin.savedTip = "儲存失敗，請檢查網路連線後再試一次";
  }
  render();
  setTimeout(() => { S.admin.savedTip = ""; render(); }, 3000);
};
window.adminAddClosedDate = async () => {
  const val = document.getElementById("closed-date-input").value;
  if (!val) { S.admin.closedTip = "請先選擇日期"; render(); return; }
  const checked = Array.from(document.querySelectorAll(".closed-seg-check:checked")).map(el => el.value);
  if (checked.length === 0) { S.admin.closedTip = "請至少勾選一個時段"; render(); return; }
  const updated = { ...S.closedDates, [val]: checked };
  const ok = await setConfig("closedDates", { entries: updated });
  if (ok) { S.closedDates = updated; S.admin.closedTip = "休診設定已更新"; }
  else { S.admin.closedTip = "儲存失敗，請檢查網路連線後再試一次"; }
  render();
  setTimeout(() => { S.admin.closedTip = ""; render(); }, 3000);
};
window.adminRemoveClosedDate = async (d) => {
  const updated = { ...S.closedDates };
  delete updated[d];
  const ok = await setConfig("closedDates", { entries: updated });
  if (ok) S.closedDates = updated;
  render();
};
window.adminBlockSelectTherapist = (id) => { S.admin.block.therapistId = id; render(); };
window.adminBlockDateChange = async (val) => {
  S.admin.block.date = val;
  if (val) await ensureBlocks(val);
  render();
};
window.adminAddBlock = async () => {
  const b = S.admin.block;
  const start = document.getElementById("block-start-input").value;
  const end = document.getElementById("block-end-input").value;
  if (!b.therapistId) { b.tip = "請先選擇師傅"; render(); return; }
  if (!b.date) { b.tip = "請選擇日期"; render(); return; }
  if (!start || !end || start >= end) { b.tip = "請選擇正確的開始與結束時間"; render(); return; }
  const therapist = S.therapists.find(t => t.id === b.therapistId);
  const rec = { date: b.date, therapistId: b.therapistId, therapistName: therapist?.name || "", start, end, createdAt: Date.now() };
  const id = await addBlockDoc(rec);
  if (!S.blocksCache[b.date]) S.blocksCache[b.date] = [];
  S.blocksCache[b.date].push({ id, ...rec });
  b.start = ""; b.end = ""; b.tip = "已鎖定這個時段";
  render();
  setTimeout(() => { S.admin.block.tip = ""; render(); }, 2500);
};
window.adminRemoveBlock = async (id, date) => {
  await removeBlockDoc(id);
  if (S.blocksCache[date]) S.blocksCache[date] = S.blocksCache[date].filter(bl => bl.id !== id);
  render();
};

  const val = document.getElementById("new-pass-input").value.trim();

};
